name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src

      - name: Compile / import sanity
        run: python -m compileall src

      - name: Tests
        run: python -m pytest

      - name: Build sdist/wheel
        run: python -m build

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh shellcheck

      - name: Bash syntax (bash -n)
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n bin/ctx
          bash -n shell/ctx.sh
          bash -n completions/ctx.bash

      - name: Zsh syntax (zsh -n)
        run: |
          zsh -n shell/ctx.zsh
          zsh -n completions/ctx.zsh

      - name: ShellCheck
        run: |
          shellcheck install.sh uninstall.sh bin/ctx shell/ctx.sh completions/ctx.bash
